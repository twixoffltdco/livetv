<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LiveM3U Web Player - IPTV Плеер</title>
    <style>
    html,body{margin:0;height:100%;background:#000;font-family:Inter,system-ui,sans-serif;color:#fff}
    #player{width:100%;height:100%}
    .status{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:10px;color:#ddd;padding:24px;text-align:center;z-index:1000;background:rgba(0,0,0,.85)}
    .hint{opacity:.75;font-size:14px}
    .channel-panel{position:fixed;top:0;left:0;width:350px;height:100%;background:#1a1a2e;z-index:2000;transform:translateX(-100%);transition:transform .3s ease;overflow:hidden;display:flex;flex-direction:column;box-shadow:2px 0 10px rgba(0,0,0,.5)}
    .channel-panel.open{transform:translateX(0)}
    .panel-header{padding:15px;background:#16213e;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #0f3460}
    .panel-header h3{margin:0;font-size:16px}
    .close-btn{background:none;border:none;color:#fff;font-size:24px;cursor:pointer;padding:0 5px}
    .panel-content{flex:1;overflow-y:auto;padding:10px}
    .channels-toggle{position:fixed;top:10px;left:10px;z-index:1500;background:#e94560;border:none;color:#fff;padding:10px 15px;border-radius:8px;cursor:pointer;font-size:14px;display:flex;align-items:center;gap:8px;box-shadow:0 2px 10px rgba(0,0,0,.3)}
    .channels-toggle:hover{background:#ff6b6b}
    .embed-btn{position:fixed;top:10px;right:10px;z-index:1500;background:#0f3460;border:none;color:#fff;padding:10px 15px;border-radius:8px;cursor:pointer;font-size:14px;display:flex;align-items:center;gap:8px;box-shadow:0 2px 10px rgba(0,0,0,.3)}
    .embed-btn:hover{background:#16213e}
    .playlist-group{margin-bottom:15px}
    .playlist-group-title{font-size:13px;color:#888;margin-bottom:8px;text-transform:uppercase;letter-spacing:1px}
    .playlist-item{padding:10px 12px;margin:4px 0;background:#0f3460;border-radius:6px;cursor:pointer;transition:background .2s;font-size:14px;display:flex;align-items:center;gap:8px}
    .playlist-item:hover{background:#1a1a2e}
    .playlist-item.active{background:#e94560}
    .playlist-item .count{margin-left:auto;font-size:11px;color:#888;background:#16213e;padding:2px 6px;border-radius:4px}
    .channel-list{display:none}
    .channel-list.active{display:block}
    .channel-item{padding:10px 12px;margin:4px 0;background:#0f3460;border-radius:6px;cursor:pointer;transition:background .2s;font-size:13px;display:flex;align-items:center;gap:8px}
    .channel-item:hover{background:#1a1a2e}
    .channel-item.playing{background:#e94560}
    .channel-item .ch-name{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .panel-nav{padding:10px;background:#16213e;border-bottom:1px solid #0f3460;display:flex;gap:8px}
    .nav-btn{flex:1;padding:8px;background:#0f3460;border:none;color:#fff;border-radius:6px;cursor:pointer;font-size:12px}
    .nav-btn:hover{background:#1a1a2e}
    .nav-btn.active{background:#e94560}
    .back-btn{background:#e94560!important}
    .search-box{padding:10px;background:#16213e;border-bottom:1px solid #0f3460}
    .search-input{width:100%;padding:8px 12px;background:#0f3460;border:1px solid #1a1a2e;border-radius:6px;color:#fff;font-size:13px;box-sizing:border-box}
    .search-input::placeholder{color:#666}
    .embed-modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.8);z-index:3000;display:none;align-items:center;justify-content:center}
    .embed-modal.open{display:flex}
    .embed-content{background:#1a1a2e;padding:25px;border-radius:12px;max-width:500px;width:90%;max-height:80vh;overflow-y:auto}
    .embed-content h3{margin:0 0 15px 0;font-size:18px}
    .embed-tabs{display:flex;gap:10px;margin-bottom:15px}
    .embed-tab{flex:1;padding:10px;background:#0f3460;border:none;color:#fff;border-radius:6px;cursor:pointer;font-size:13px}
    .embed-tab.active{background:#e94560}
    .embed-code{background:#0f3460;padding:15px;border-radius:6px;margin-bottom:15px;overflow-x:auto}
    .embed-code pre{margin:0;white-space:pre-wrap;font-size:12px;font-family:'Courier New',monospace;color:#00ff88}
    .embed-actions{display:flex;gap:10px}
    .action-btn{flex:1;padding:10px;background:#e94560;border:none;color:#fff;border-radius:6px;cursor:pointer;font-size:13px}
    .action-btn:hover{background:#ff6b6b}
    .action-btn.secondary{background:#0f3460}
    .action-btn.secondary:hover{background:#16213e}
    .close-modal{position:absolute;top:15px;right:15px;background:none;border:none;color:#fff;font-size:28px;cursor:pointer}
    @media(max-width:600px){.channel-panel{width:100%}.channels-toggle span,.embed-btn span{display:none}}
    </style>
</head>
<body>
  <div id="player"></div>
  <div id="status" class="status">Выберите канал из списка или откройте ?src=URL</div>
  
  <button class="channels-toggle" onclick="togglePanel()">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
    <span>Каналы</span>
  </button>
  
  <button class="embed-btn" onclick="openEmbedModal()">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 18l6-6-6-6"/><path d="M8 6l-6 6 6 6"/></svg>
    <span>Встроить</span>
  </button>
  
  <div class="channel-panel" id="channelPanel">
    <div class="panel-header">
      <h3 id="panelTitle">Выбор канала</h3>
      <button class="close-btn" onclick="togglePanel()">&times;</button>
    </div>
    <div class="search-box">
      <input type="text" class="search-input" id="searchInput" placeholder="Поиск канала..." oninput="searchChannels()">
    </div>
    <div class="panel-nav" id="panelNav" style="display:none">
      <button class="nav-btn back-btn" onclick="showPlaylists()">← Назад</button>
    </div>
    <div class="panel-content">
      <div id="playlistsList" class="channel-list active"></div>
      <div id="channelsList" class="channel-list"></div>
    </div>
  </div>
  
  <div class="embed-modal" id="embedModal">
    <div class="embed-content">
      <button class="close-modal" onclick="closeEmbedModal()">&times;</button>
      <h3>Встроить плеер на сайт</h3>
      <div class="embed-tabs">
        <button class="embed-tab active" onclick="switchEmbedTab('iframe')">iFrame</button>
        <button class="embed-tab" onclick="switchEmbedTab('js')">JS Код</button>
      </div>
      <div id="embedIframe" class="embed-code"><pre id="iframeCode"></pre></div>
      <div id="embedJs" class="embed-code" style="display:none"><pre id="jsCode"></pre></div>
      <div class="embed-actions">
        <button class="action-btn" onclick="copyEmbedCode()">Копировать</button>
        <button class="action-btn secondary" onclick="closeEmbedModal()">Закрыть</button>
      </div>
    </div>
  </div>
  
  <script src="https://cdn.jsdelivr.net/gh/OinkTechLLC/cdnplayerjs@main/playerjs.js"></script>
  <script>
    let currentChannels=[],currentPlayer=null,embedType='iframe';
    const PROXY_URL='https://secure-271717.tatnet.app/';
    const params=new URLSearchParams(window.location.search);
    const initialSrc=params.get('src')||params.get('file')||params.get('stream')||'';
    const initialTitle=params.get('title')||'IPTV канал';
    const status=document.getElementById('status');

    document.addEventListener('DOMContentLoaded',()=>{loadPlaylists();if(initialSrc)playChannel(initialSrc,initialTitle);});

    async function loadPlaylists(){
      const container=document.getElementById('playlistsList');
      container.innerHTML='<div class="playlist-group"><div class="playlist-group-title">Основные плейлисты</div></div>';
      const mainGroup=container.querySelector('.playlist-group');
      const mainItem=document.createElement('div');
      mainItem.className='playlist-item';
      mainItem.innerHTML='<span>📺 Оригинальный playlist.m3u</span><span class="count">~7600</span>';
      mainItem.onclick=()=>loadChannelsFromM3u('data/playlist.m3u','Оригинальный плейлист');
      mainGroup.appendChild(mainItem);
      
      try{
        const response=await fetch('data/playlists/');
        if(response.ok){
          const text=await response.text();
          const parser=new DOMParser();
          const doc=parser.parseFromString(text,'text/html');
          const links=doc.querySelectorAll('a[href$=".m3u"]');
          if(links.length>0){
            const themedGroup=document.createElement('div');
            themedGroup.className='playlist-group';
            themedGroup.innerHTML='<div class="playlist-group-title">Тематические плейлисты</div>';
            links.forEach(link=>{
              const href=link.getAttribute('href');
              const name=decodeURIComponent(href.replace('.m3u','').replace(/_/g,' '));
              const item=document.createElement('div');
              item.className='playlist-item';
              item.innerHTML=`<span>📁 ${name}</span>`;
              item.onclick=()=>loadChannelsFromM3u(`data/playlists/${href}`,name);
              themedGroup.appendChild(item);
            });
            container.appendChild(themedGroup);
          }
        }
      }catch(e){console.error('Ошибка загрузки списка плейлистов:',e);}
    }

    async function loadChannelsFromM3u(url,name){
      document.getElementById('panelTitle').textContent=name;
      document.getElementById('panelNav').style.display='flex';
      document.getElementById('playlistsList').classList.remove('active');
      document.getElementById('channelsList').classList.add('active');
      const container=document.getElementById('channelsList');
      container.innerHTML='<div style="padding:20px;text-align:center;color:#888">Загрузка каналов...</div>';
      try{
        // Используем прокси только для внешних URL, локальные файлы грузим напрямую
        let response;
        if(url.startsWith('http://')||url.startsWith('https://')){
          const proxyUrl=PROXY_URL+encodeURIComponent(url);
          response=await fetch(proxyUrl);
        }else{
          response=await fetch(url);
        }
        if(!response.ok)throw new Error('Не удалось загрузить плейлист (код '+response.status+')');
        const text=await response.text();
        currentChannels=parseM3u(text);
        container.innerHTML='';
        if(currentChannels.length===0){container.innerHTML='<div style="padding:20px;text-align:center;color:#888">Каналы не найдены</div>';return;}
        currentChannels.forEach((channel,index)=>{
          const item=document.createElement('div');
          item.className='channel-item';
          item.innerHTML=`<span class="ch-name">${channel.name||`Канал ${index+1}`}</span>`;
          item.onclick=()=>{document.querySelectorAll('.channel-item').forEach(i=>i.classList.remove('playing'));item.classList.add('playing');playChannel(channel.url,channel.name);if(window.innerWidth<=600)togglePanel();};
          container.appendChild(item);
        });
      }catch(e){console.error('Ошибка загрузки каналов:',e);container.innerHTML=`<div style="padding:20px;text-align:center;color:#e94560">Ошибка: ${e.message}<br><small>Проверьте наличие файла или доступность URL</small></div>`;}
    }

    function parseM3u(content){
      const channels=[];const lines=content.split('\n');let currentChannel={};
      for(let line of lines){line=line.trim();if(line.startsWith('#EXTINF:')){const nameMatch=line.match(/,(.+)$/);currentChannel.name=nameMatch?nameMatch[1].trim():'';}else if(line&&!line.startsWith('#')){if(currentChannel.name){currentChannel.url=line;channels.push({...currentChannel});currentChannel={};}}}
      return channels;
    }

    function playChannel(src,title){
      status.style.display='none';
      if(currentPlayer){try{currentPlayer.destroy();}catch(e){}}
      document.title=`${title} — IPTV Player`;
      try{currentPlayer=new Playerjs({id:'player',file:src,poster:'',title:title,autoplay:1});status.style.display='none';}catch(e){console.error(e);showMessage('Не удалось инициализировать плеер','Попробуйте другой канал');}
    }

    function searchChannels(){const query=document.getElementById('searchInput').value.toLowerCase();const items=document.querySelectorAll('.channel-item');items.forEach(item=>{const name=item.querySelector('.ch-name').textContent.toLowerCase();item.style.display=name.includes(query)?'flex':'none';});}
    function showPlaylists(){document.getElementById('panelTitle').textContent='Выбор плейлиста';document.getElementById('panelNav').style.display='none';document.getElementById('playlistsList').classList.add('active');document.getElementById('channelsList').classList.remove('active');document.getElementById('searchInput').value='';searchChannels();}
    function togglePanel(){document.getElementById('channelPanel').classList.toggle('open');}
    function showMessage(msg,hint=''){status.innerHTML=`<strong>${msg}</strong>${hint?`<div class="hint">${hint}</div>`:''}`;status.style.display='flex';}

    function getBaseUrl(){return window.location.origin+window.location.pathname;}
    function openEmbedModal(){document.getElementById('embedModal').classList.add('open');updateEmbedCode();}
    function closeEmbedModal(){document.getElementById('embedModal').classList.remove('open');}
    function switchEmbedTab(type){embedType=type;document.querySelectorAll('.embed-tab').forEach(t=>t.classList.remove('active'));event.target.classList.add('active');document.getElementById('embedIframe').style.display=type==='iframe'?'block':'none';document.getElementById('embedJs').style.display=type==='js'?'block':'none';updateEmbedCode();}
    function updateEmbedCode(){const baseUrl=getBaseUrl();const streamUrl=initialSrc;const title=encodeURIComponent(initialTitle);if(embedType==='iframe'){const code=streamUrl?`<iframe src="${baseUrl}?src=${encodeURIComponent(streamUrl)}&title=${title}" width="100%" height="100%" frameborder="0" allowfullscreen></iframe>`:`<iframe src="${baseUrl}" width="100%" height="100%" frameborder="0" allowfullscreen></iframe>`;document.getElementById('iframeCode').textContent=code;}else{const jsUrl=baseUrl.endsWith('.html')?baseUrl.replace('.html','.js'):baseUrl+'.js';const code=`<script src="${jsUrl}?src=${encodeURIComponent(streamUrl)}&title=${title}"><\/script>`;document.getElementById('jsCode').textContent=code;}}
    function copyEmbedCode(){const code=embedType==='iframe'?document.getElementById('iframeCode').textContent:document.getElementById('jsCode').textContent;navigator.clipboard.writeText(code).then(()=>{const btn=event.target;const originalText=btn.textContent;btn.textContent='Скопировано!';setTimeout(()=>btn.textContent=originalText,2000);}).catch(()=>{alert('Скопируйте код вручную: '+code);});}
    document.getElementById('embedModal').addEventListener('click',(e)=>{if(e.target.id==='embedModal')closeEmbedModal();});
  </script>
</body>
</html>
