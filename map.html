<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Карта ТВ каналов - LiveM3U</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/OinkTechLLC/cdnplayerjs@main/playerjs.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/OinkTechLtd/cdnplayerjs@main/playerjs.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/twixoffltdco/cdnplayerjs@main/playerjs.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.2);
            --neon-blue: #00f5ff;
            --neon-purple: #bd00ff;
            --dark-bg: #0a0a0f;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark-bg); color: #fff; min-height: 100vh; overflow: hidden; }
        .header { position: absolute; top: 0; left: 0; right: 0; z-index: 1000; background: var(--glass-bg); backdrop-filter: blur(20px); border-bottom: 1px solid var(--glass-border); padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; }
        .header h1 { font-size: 1.5em; background: var(--primary-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .close-btn { background: var(--primary-gradient); border: none; color: #fff; padding: 10px 25px; border-radius: 25px; cursor: pointer; font-weight: 600; transition: all 0.3s ease; }
        .close-btn:hover { transform: scale(1.05); box-shadow: 0 0 30px rgba(102, 126, 234, 0.5); }
        #map { width: 100%; height: 100vh; background: #1a1a2e; }
        .leaflet-popup-content-wrapper { background: var(--glass-bg); backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-radius: 16px; color: #fff; }
        .leaflet-popup-tip { background: var(--glass-bg); }
        .country-info { min-width: 250px; }
        .country-name { font-size: 1.3em; font-weight: 700; margin-bottom: 15px; background: var(--primary-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .channel-select { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid var(--glass-border); background: rgba(0, 0, 0, 0.4); color: #fff; font-size: 1em; margin-bottom: 15px; cursor: pointer; }
        .channel-select:focus { outline: none; border-color: var(--neon-blue); }
        .play-btn { width: 100%; padding: 12px; background: var(--primary-gradient); border: none; border-radius: 10px; color: #fff; font-size: 1em; font-weight: 600; cursor: pointer; transition: all 0.3s ease; }
        .play-btn:hover { transform: scale(1.02); box-shadow: 0 0 20px rgba(102, 126, 234, 0.5); }
        .player-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.9); z-index: 2000; justify-content: center; align-items: center; flex-direction: column; }
        .player-modal.active { display: flex; }
        .player-container { width: 90%; max-width: 1200px; aspect-ratio: 16/9; background: #000; border-radius: 16px; overflow: hidden; box-shadow: 0 0 60px rgba(102, 126, 234, 0.3); }
        .player-container iframe { width: 100%; height: 100%; border: none; }
        .player-controls { margin-top: 20px; display: flex; gap: 15px; align-items: center; flex-wrap: wrap; justify-content: center; }
        .player-title { font-size: 1.3em; color: #fff; }
        .switch-player-btn { background: transparent; border: 2px solid var(--neon-purple); color: #fff; padding: 10px 20px; border-radius: 25px; cursor: pointer; font-weight: 600; transition: all 0.3s ease; }
        .switch-player-btn:hover { background: var(--neon-purple); }
        .close-player-btn { background: var(--primary-gradient); border: none; color: #fff; padding: 10px 25px; border-radius: 25px; cursor: pointer; font-weight: 600; }
        .status-message { color: rgba(255, 255, 255, 0.7); font-size: 0.9em; margin-top: 10px; }
        .legend { position: absolute; bottom: 30px; right: 30px; z-index: 1000; background: var(--glass-bg); backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-radius: 16px; padding: 20px; max-width: 300px; }
        .legend h3 { font-size: 1em; margin-bottom: 10px; color: var(--neon-blue); }
        .legend p { font-size: 0.85em; color: rgba(255, 255, 255, 0.7); line-height: 1.6; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🗺️ Карта ТВ каналов</h1>
        <button class="close-btn" onclick="window.close()">✕ Закрыть</button>
    </div>
    <div id="map"></div>
    <div class="legend">
        <h3>📡 Как использовать</h3>
        <p>1. Кликните на страну на карте<br>2. Выберите канал из списка<br>3. Нажмите "Смотреть"<br>4. Если плеер не работает, нажмите "Переключить плеер"</p>
    </div>
    <div class="player-modal" id="playerModal">
        <div class="player-container" id="playerContainer"></div>
        <div class="player-controls">
            <span class="player-title" id="playerTitle"></span>
            <button class="switch-player-btn" onclick="switchPlayer()">🔄 Переключить плеер</button>
            <button class="close-player-btn" onclick="closePlayer()">✕ Закрыть</button>
        </div>
        <div class="status-message" id="statusMessage"></div>
    </div>
    <script>
        let countriesData = {};
        let allChannels = [];

        // Загрузка плейлиста из data/playlist.m3u
        async function loadPlaylist() {
            try {
                const response = await fetch('data/playlist.m3u');
                const text = await response.text();
                parseM3U(text);
            } catch (error) {
                console.error('Ошибка загрузки плейлиста:', error);
                alert('Не удалось загрузить плейлист каналов');
            }
        }

        function parseM3U(content) {
            const lines = content.split('\n');
            let currentChannel = null;
            
            for (let i = 0; i < lines.length; i++) {
                const line = lines[i].trim();
                
                if (line.startsWith('#EXTINF:')) {
                    // Парсим информацию о канале
                    const nameMatch = line.match(/,(.+?)(?:\s*$|\s*\|)/);
                    const groupMatch = line.match(/group-title="([^"]*)"/);
                    const tvgNameMatch = line.match(/tvg-name="([^"]*)"/);
                    
                    if (nameMatch) {
                        currentChannel = {
                            name: nameMatch[1].trim(),
                            group: groupMatch ? groupMatch[1] : 'Undefined',
                            tvgName: tvgNameMatch ? tvgNameMatch[1] : ''
                        };
                    }
                } else if (line.startsWith('http') && currentChannel) {
                    currentChannel.url = line;
                    
                    // Определяем страну из группы или названия
                    let country = 'Undefined';
                    const groupLower = currentChannel.group.toLowerCase();
                    
                    // Сопоставление групп со странами
                    const countryMap = {
                        'russia': 'Россия',
                        'украина': 'Украина',
                        'belarus': 'Беларусь',
                        'kazakhstan': 'Казахстан',
                        'germany': 'Германия',
                        'uk': 'Великобритания',
                        'united kingdom': 'Великобритания',
                        'france': 'Франция',
                        'italy': 'Италия',
                        'spain': 'Испания',
                        'usa': 'США',
                        'united states': 'США',
                        'china': 'Китай',
                        'japan': 'Япония',
                        'turkey': 'Турция',
                        'india': 'Индия',
                        'brazil': 'Бразилия',
                        'australia': 'Австралия',
                        'albania': 'Албания',
                        'news': 'Новости',
                        'iptv': 'IPTV'
                    };
                    
                    for (const [key, value] of Object.entries(countryMap)) {
                        if (groupLower.includes(key)) {
                            country = value;
                            break;
                        }
                    }
                    
                    // Добавляем канал в список для страны
                    if (!countriesData[country]) {
                        countriesData[country] = { coords: getCountryCoords(country), channels: [] };
                    }
                    
                    // Ограничиваем количество каналов на страну (первые 20 уникальных)
                    const existingNames = countriesData[country].channels.map(ch => ch.name);
                    if (!existingNames.includes(currentChannel.name) && 
                        countriesData[country].channels.length < 20) {
                        countriesData[country].channels.push({
                            name: currentChannel.name,
                            url: currentChannel.url
                        });
                    }
                    
                    currentChannel = null;
                }
            }
            
            // Если какие-то страны не имеют координат по умолчанию
            for (const country in countriesData) {
                if (countriesData[country].coords[0] === 0) {
                    countriesData[country].coords = getCountryCoords(country);
                }
            }
            
            console.log('Загружено каналов по странам:', Object.keys(countriesData).length);
            initMap();
        }

        function getCountryCoords(country) {
            const coords = {
                'Россия': [61.524, 105.3188],
                'Украина': [48.3794, 31.1656],
                'Беларусь': [53.7098, 27.9534],
                'Казахстан': [48.0196, 66.9237],
                'Германия': [51.1657, 10.4515],
                'Великобритания': [55.3781, -3.436],
                'Франция': [46.2276, 2.2137],
                'Италия': [41.8719, 12.5674],
                'Испания': [40.4637, -3.7492],
                'США': [37.0902, -95.7129],
                'Китай': [35.8617, 104.1954],
                'Япония': [36.2048, 138.2529],
                'Турция': [38.9637, 35.2433],
                'Индия': [20.5937, 78.9629],
                'Бразилия': [-14.235, -51.9253],
                'Австралия': [-25.2744, 133.7751],
                'Албания': [41.1533, 20.1683],
                'Новости': [20, 0],
                'IPTV': [20, 0],
                'Undefined': [20, 0]
            };
            return coords[country] || [20, 0];
        }

        let currentCountry = null;
        let currentChannel = null;
        let currentPlayerIndex = 0;
        
        // Массив провайдеров PlayerJS для переключения при ошибках
        const playerProviders = [
            { name: "OinkTechLLC", loaded: false },
            { name: "OinkTechLtd", loaded: false },
            { name: "twixoffltdco", loaded: false }
        ];

        let map;

        function initMap() {
            map = L.map('map', { center: [20, 0], zoom: 2, minZoom: 2, maxZoom: 8 });
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                attribution: '© OpenStreetMap © CARTO', subdomains: 'abcd', maxZoom: 20
            }).addTo(map);

            Object.entries(countriesData).forEach(([countryName, data]) => {
                const marker = L.circleMarker(data.coords, { radius: 8, fillColor: '#667eea', color: '#fff', weight: 2, opacity: 1, fillOpacity: 0.7 }).addTo(map);
                marker.bindTooltip(countryName, { permanent: false, direction: 'top' });
                marker.on('click', () => openCountryPopup(countryName, data));
            });
        }

        // Загружаем плейлист при старте
        loadPlaylist();

        function openCountryPopup(countryName, data) {
            currentCountry = countryName;
            const popupContent = '<div class="country-info"><div class="country-name">' + countryName + '</div><select class="channel-select" id="channelSelect"><option value="">Выберите канал...</option>' + 
                data.channels.map((ch, i) => '<option value="' + i + '">' + ch.name + '</option>').join('') + 
                '</select><button class="play-btn" onclick="playChannel()">▶ Смотреть</button></div>';
            L.popup({ maxWidth: 300, minWidth: 250 }).setLatLng(data.coords).setContent(popupContent).openOn(map);
        }

        function playChannel() {
            const select = document.getElementById('channelSelect');
            if (!select.value) { alert('Пожалуйста, выберите канал!'); return; }
            currentChannel = countriesData[currentCountry].channels[select.value];
            currentPlayerIndex = 0;
            openPlayer(currentChannel);
        }

        function openPlayer(channel) {
            document.getElementById('playerTitle').textContent = currentCountry + ' - ' + channel.name;
            document.getElementById('statusMessage').textContent = 'Загрузка...';
            document.getElementById('playerModal').classList.add('active');
            loadPlayer(channel.url);
        }

        function loadPlayer(url) {
            const container = document.getElementById('playerContainer');
            const status = document.getElementById('statusMessage');
            container.innerHTML = '';
            
            // Проверяем доступность PlayerJS и пробуем разные провайдеры
            if (typeof Playerjs !== 'undefined') {
                const playerDiv = document.createElement('div');
                playerDiv.id = 'playerjs-player';
                playerDiv.style.width = '100%';
                playerDiv.style.height = '100%';
                container.appendChild(playerDiv);
                
                // Инициализируем плеер через PlayerJS
                window.playerInstance = new Playerjs({
                    id: "playerjs-player",
                    file: url,
                    autostart: true,
                    success: function() {
                        status.textContent = '✓ Воспроизводится (PlayerJS - провайдер ' + playerProviders[currentPlayerIndex]?.name || 'основной' + ')';
                        status.style.color = '#00f5ff';
                        playerProviders[currentPlayerIndex].loaded = true;
                    },
                    error: function() {
                        status.textContent = '⚠ Ошибка, пробуем другой провайдер...';
                        status.style.color = '#ff6b6b';
                        // Автоматическое переключение на следующий провайдер при ошибке
                        tryNextProvider();
                    }
                });
            } else {
                // Fallback на iframe если ни один PlayerJS не загрузился
                const iframe = document.createElement('iframe');
                iframe.src = url;
                iframe.allowFullscreen = true;
                iframe.allow = 'autoplay; fullscreen; encrypted-media';
                iframe.onload = () => { 
                    status.textContent = '✓ Воспроизводится (прямой режим)'; 
                    status.style.color = '#00f5ff'; 
                };
                iframe.onerror = () => { 
                    status.textContent = '⚠ Ошибка, попробуйте другой канал'; 
                    status.style.color = '#ff6b6b'; 
                };
                container.innerHTML = '';
                container.appendChild(iframe);
            }
        }
        
        function tryNextProvider() {
            // Пытаемся следующий провайдер если текущий не сработал
            if (currentPlayerIndex < playerProviders.length - 1) {
                currentPlayerIndex++;
                setTimeout(() => {
                    loadPlayer(currentChannel.url);
                }, 500);
            } else {
                // Если все провайдеры исчерпаны, переключаемся на iframe
                currentPlayerIndex = 0;
                const container = document.getElementById('playerContainer');
                const status = document.getElementById('statusMessage');
                container.innerHTML = '';
                const iframe = document.createElement('iframe');
                iframe.src = currentChannel.url;
                iframe.allowFullscreen = true;
                iframe.allow = 'autoplay; fullscreen; encrypted-media';
                container.appendChild(iframe);
                status.textContent = '✓ Прямой режим (все провайдеры испробованы)';
                status.style.color = '#bd00ff';
            }
        }

        function switchPlayer() {
            // Ручное переключение между провайдерами PlayerJS и fallback режимом
            const status = document.getElementById('statusMessage');
            
            if (currentPlayerIndex < playerProviders.length - 1) {
                // Переключаемся на следующий провайдер PlayerJS
                currentPlayerIndex++;
                status.textContent = 'Переключение на провайдер: ' + playerProviders[currentPlayerIndex].name + '...';
                status.style.color = '#bd00ff';
                loadPlayer(currentChannel.url);
            } else {
                // Если все провайдеры PlayerJS исчерпаны, переключаемся на iframe или начинаем сначала
                currentPlayerIndex = 0;
                status.textContent = 'Возврат к основному провайдеру...';
                status.style.color = '#bd00ff';
                loadPlayer(currentChannel.url);
            }
        }

        function closePlayer() {
            document.getElementById('playerModal').classList.remove('active');
            document.getElementById('playerContainer').innerHTML = '';
            currentChannel = null;
        }

        document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closePlayer(); });
    </script>
</body>
</html>
