name: LiveM3U Bot

on:
  schedule:
    - cron: '*/30 * * * *'  # Запуск каждые 30 минут
  workflow_dispatch:        # Возможность ручного запуска

permissions:
  contents: write           # Разрешение на запись в репозиторий

jobs:
  scan-and-commit:
    timeout-minutes: 6
    concurrency:
      group: livem3u-auto-update
      cancel-in-progress: true
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5  # Стабильная версия
        
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install aiohttp
          
      - name: Run IPTV Scanner
        timeout-minutes: 5
        run: python scanner.py
        env:
          PROXY_HOST: "secure-272717.tatnet.app"
          PROXY_PORT: "8080"
          FAST_SCAN: "1"
          PYTHONUNBUFFERED: "1"
          
      - name: Commit and Push Changes
        run: |
          git config --local user.email "OinkTechLtd[bot]@fillshowyt@gmail.com"
          git config --local user.name "OinkTechLtd[bot]"
          
          # Добавляем все изменения
          git add -A
          
          # Проверяем, есть ли изменения
          if git diff --staged --quiet; then
            echo "✅ Изменений нет, плейлисты актуальны."
          else
            git commit -m "🤖 Автообновление: $(date '+%Y-%m-%d %H:%M') | Прокси: secure-272717.tatnet.app"
            git push
            echo "✅ Обновление успешно загружено в репозиторий!"
          fi
